<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sae Bot Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #23272a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #2c2f33;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 { margin-bottom: 10px; color: #7289da; font-size: 28px; }
        p { color: #b9bbbe; margin-bottom: 30px; font-size: 16px; }
        .btn {
            display: inline-block;
            background-color: #7289da;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background-color: #677bc4; transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sae Bot Verification</h1>
        <p>Click the button below to safely verify your account and access the server channels.</p>
        <a href="#" class="btn">Verify Me</a>
    </div>
</body>
</html>
